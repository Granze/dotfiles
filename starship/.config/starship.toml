# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$username\
$directory\
$git_branch\
$git_status\
$nodejs\
$fill\
$cmd_duration\
$line_break$character"""

[line_break]
disabled = false

[fill]
symbol= ' '

[username]
style_user = 'blue bold'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
ssh_symbol = "¯¼ü "
format = '[$ssh_symbol](bold gray) at [´ê│ $hostname](bold green) '
